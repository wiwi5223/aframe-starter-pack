<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
     <script src="https://unpkg.com/aframe-environment-component/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#ffffff"></a-sphere>
      <a-sphere position="0 3 -5" radius="1" color="#ffffff"></a-sphere>
      <a-sphere position="0 4.5 -5" radius=".75" color="#ffffff"></a-sphere>
      <a-sphere position=".35 4.5 -4" radius=".05" color="#000000"></a-sphere>
      <a-sphere position="-.35 4.5 -4" radius=".05" color="#000000"></a-sphere>
      <a-sphere position="0 3.5 -4" radius=".05" color="#000000"></a-sphere>
      <a-sphere position="0 3 -4" radius=".05" color="#000000"></a-sphere>
      <a-sphere position="0 2.5 -4" radius=".05" color="#000000"></a-sphere>
      <a-plane position="0 0.1 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <!-- <a-sky color="#ECECEC"></a-sky> -->
      <!-- the enviroment entity includes a sky. Choose from the presets"none, default, contact, egypt, checkerboard, forest, goaland, yavapai, goldmine, threetowers, poison, arches, tron, japan, dream, volcano, starry, osiris, moon" -->
      <a-entity environment="preset: egypt; dressingAmount: 500"></a-entity>
    </a-scene>
  </body>
</html>
