<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
        <a-assets>
          <img id="beachball" src="assets/beachball.jpg">
          <img id="scene" src="assets/vrpictruescene.jpg">
          <video id="nownownowyes" autoplay loop="true" src="assets/nownownowyes.mp4"></video>
        </a-assets>
      <a-box position="-1 0.5 -3" rotation="0 45 0" src="#beachball"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" a-video src="#nownownowyes"></a-sphere>
      <a-cylinder position="1 0.75 -3" radius="0.5" height="1.5" color="#FFC65D"></a-cylinder>
      <a-plane position="0 0 -4" rotation="-90 0 0" width="4" height="4" color="#7BC8A4"></a-plane>
      <a-sky src="#scene"></a-sky>
    </a-scene>
  </body>
</html>
